name: Deploy Uni-Finder to Azure Container Apps

on:
  push:
    branches: [main, yasiru]
  workflow_dispatch:

env:
  AZURE_RESOURCE_GROUP: unifinder-rg
  AZURE_LOCATION: eastus
  ENVIRONMENT: prod
  ACR_NAME: unifinderacr2026main01

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create Resource Group
        run: |
          az group create \
            --name ${{ env.AZURE_RESOURCE_GROUP }} \
            --location ${{ env.AZURE_LOCATION }}

      - name: Deploy Infrastructure
        run: |
          az deployment group create \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --template-file deploy/azure/main.bicep \
            --parameters \
              environmentName=${{ env.ENVIRONMENT }} \
              acrName=${{ env.ACR_NAME }} \
              location=${{ env.AZURE_LOCATION }}

      - name: Get ACR Credentials
        id: acr-creds
        run: |
          ACR_USERNAME=$(az acr credential show --name ${{ env.ACR_NAME }} --query username -o tsv)
          ACR_PASSWORD=$(az acr credential show --name ${{ env.ACR_NAME }} --query passwords[0].value -o tsv)
          ACR_LOGIN_SERVER="${{ env.ACR_NAME }}.azurecr.io"
          
          echo "ACR_USERNAME=$ACR_USERNAME" >> $GITHUB_ENV
          echo "ACR_PASSWORD=$ACR_PASSWORD" >> $GITHUB_ENV
          echo "ACR_LOGIN_SERVER=$ACR_LOGIN_SERVER" >> $GITHUB_ENV

      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ env.ACR_USERNAME }}
          password: ${{ env.ACR_PASSWORD }}

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ env.ACR_LOGIN_SERVER }}/unifinder-backend:${{ github.sha }},${{ env.ACR_LOGIN_SERVER }}/unifinder-backend:latest

      - name: Build and Push Degree Service Image
        uses: docker/build-push-action@v6
        with:
          context: ./degree-recommendation-service
          file: ./degree-recommendation-service/Dockerfile
          push: true
          tags: ${{ env.ACR_LOGIN_SERVER }}/unifinder-degree-service:${{ github.sha }},${{ env.ACR_LOGIN_SERVER }}/unifinder-degree-service:latest

      - name: Build and Push Budget Service Image
        uses: docker/build-push-action@v6
        with:
          context: ./budget_optimizer_service
          file: ./budget_optimizer_service/Dockerfile
          push: true
          tags: ${{ env.ACR_LOGIN_SERVER }}/unifinder-budget-service:${{ github.sha }},${{ env.ACR_LOGIN_SERVER }}/unifinder-budget-service:latest

      - name: Build and Push Career Service Image
        uses: docker/build-push-action@v6
        with:
          context: ./career-service
          file: ./career-service/Dockerfile
          push: true
          tags: ${{ env.ACR_LOGIN_SERVER }}/unifinder-career-service:${{ github.sha }},${{ env.ACR_LOGIN_SERVER }}/unifinder-career-service:latest

      - name: Build and Push Scholarship Service Image
        uses: docker/build-push-action@v6
        with:
          context: ./scholarship_and_loan_recommendation_service
          file: ./scholarship_and_loan_recommendation_service/Dockerfile
          push: true
          tags: ${{ env.ACR_LOGIN_SERVER }}/unifinder-scholarship-service:${{ github.sha }},${{ env.ACR_LOGIN_SERVER }}/unifinder-scholarship-service:latest

      - name: Get Container Apps Environment ID
        id: get-env
        run: |
          ENV_ID=$(az containerapp env show \
            --name unifinder-${{ env.ENVIRONMENT }}-env \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query id -o tsv)
          echo "CONTAINER_APPS_ENV_ID=$ENV_ID" >> $GITHUB_ENV

      - name: Deploy Backend Container App
        run: |
          az containerapp create \
            --name unifinder-backend \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --environment ${{ env.CONTAINER_APPS_ENV_ID }} \
            --image ${{ env.ACR_LOGIN_SERVER }}/unifinder-backend:latest \
            --target-port 5000 \
            --ingress external \
            --registry-server ${{ env.ACR_LOGIN_SERVER }} \
            --registry-username ${{ env.ACR_USERNAME }} \
            --registry-password ${{ env.ACR_PASSWORD }} \
            --cpu 0.5 --memory 1Gi \
            --min-replicas 1 --max-replicas 3 \
            --env-vars \
              PORT=5000 \
              MONGO="${{ secrets.MONGO_URI }}" \
              JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              CORS_ORIGINS="https://unifinder-frontend.$(az containerapp env show --name unifinder-${{ env.ENVIRONMENT }}-env --resource-group ${{ env.AZURE_RESOURCE_GROUP }} --query properties.defaultDomain -o tsv)" \
            || az containerapp update \
              --name unifinder-backend \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --image ${{ env.ACR_LOGIN_SERVER }}/unifinder-backend:latest

      - name: Deploy Degree Service Container App
        run: |
          az containerapp create \
            --name unifinder-degree-service \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --environment ${{ env.CONTAINER_APPS_ENV_ID }} \
            --image ${{ env.ACR_LOGIN_SERVER }}/unifinder-degree-service:latest \
            --target-port 5001 \
            --ingress external \
            --registry-server ${{ env.ACR_LOGIN_SERVER }} \
            --registry-username ${{ env.ACR_USERNAME }} \
            --registry-password ${{ env.ACR_PASSWORD }} \
            --cpu 0.5 --memory 1Gi \
            --min-replicas 1 --max-replicas 3 \
            --env-vars PORT=5001 \
            || az containerapp update \
              --name unifinder-degree-service \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --image ${{ env.ACR_LOGIN_SERVER }}/unifinder-degree-service:latest

      - name: Deploy Budget Service Container App
        run: |
          az containerapp create \
            --name unifinder-budget-service \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --environment ${{ env.CONTAINER_APPS_ENV_ID }} \
            --image ${{ env.ACR_LOGIN_SERVER }}/unifinder-budget-service:latest \
            --target-port 5002 \
            --ingress external \
            --registry-server ${{ env.ACR_LOGIN_SERVER }} \
            --registry-username ${{ env.ACR_USERNAME }} \
            --registry-password ${{ env.ACR_PASSWORD }} \
            --cpu 0.5 --memory 1Gi \
            --min-replicas 1 --max-replicas 3 \
            --env-vars \
              PORT=5002 \
              OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
            || az containerapp update \
              --name unifinder-budget-service \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --image ${{ env.ACR_LOGIN_SERVER }}/unifinder-budget-service:latest

      - name: Deploy Career Service Container App
        run: |
          az containerapp create \
            --name unifinder-career-service \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --environment ${{ env.CONTAINER_APPS_ENV_ID }} \
            --image ${{ env.ACR_LOGIN_SERVER }}/unifinder-career-service:latest \
            --target-port 5004 \
            --ingress external \
            --registry-server ${{ env.ACR_LOGIN_SERVER }} \
            --registry-username ${{ env.ACR_USERNAME }} \
            --registry-password ${{ env.ACR_PASSWORD }} \
            --cpu 0.5 --memory 1Gi \
            --min-replicas 1 --max-replicas 3 \
            --env-vars \
              PORT=5004 \
              GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
            || az containerapp update \
              --name unifinder-career-service \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --image ${{ env.ACR_LOGIN_SERVER }}/unifinder-career-service:latest

      - name: Deploy Scholarship Service Container App
        run: |
          az containerapp create \
            --name unifinder-scholarship-service \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --environment ${{ env.CONTAINER_APPS_ENV_ID }} \
            --image ${{ env.ACR_LOGIN_SERVER }}/unifinder-scholarship-service:latest \
            --target-port 5005 \
            --ingress external \
            --registry-server ${{ env.ACR_LOGIN_SERVER }} \
            --registry-username ${{ env.ACR_USERNAME }} \
            --registry-password ${{ env.ACR_PASSWORD }} \
            --cpu 0.5 --memory 1Gi \
            --min-replicas 1 --max-replicas 3 \
            --env-vars PORT=5005 \
            || az containerapp update \
              --name unifinder-scholarship-service \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --image ${{ env.ACR_LOGIN_SERVER }}/unifinder-scholarship-service:latest

      - name: Get Service URLs
        id: get-urls
        run: |
          BACKEND_URL="https://$(az containerapp show --name unifinder-backend --resource-group ${{ env.AZURE_RESOURCE_GROUP }} --query properties.configuration.ingress.fqdn -o tsv)"
          DEGREE_URL="https://$(az containerapp show --name unifinder-degree-service --resource-group ${{ env.AZURE_RESOURCE_GROUP }} --query properties.configuration.ingress.fqdn -o tsv)"
          BUDGET_URL="https://$(az containerapp show --name unifinder-budget-service --resource-group ${{ env.AZURE_RESOURCE_GROUP }} --query properties.configuration.ingress.fqdn -o tsv)"
          CAREER_URL="https://$(az containerapp show --name unifinder-career-service --resource-group ${{ env.AZURE_RESOURCE_GROUP }} --query properties.configuration.ingress.fqdn -o tsv)"
          SCHOLARSHIP_URL="https://$(az containerapp show --name unifinder-scholarship-service --resource-group ${{ env.AZURE_RESOURCE_GROUP }} --query properties.configuration.ingress.fqdn -o tsv)"
          
          echo "BACKEND_URL=$BACKEND_URL" >> $GITHUB_ENV
          echo "DEGREE_URL=$DEGREE_URL" >> $GITHUB_ENV
          echo "BUDGET_URL=$BUDGET_URL" >> $GITHUB_ENV
          echo "CAREER_URL=$CAREER_URL" >> $GITHUB_ENV
          echo "SCHOLARSHIP_URL=$SCHOLARSHIP_URL" >> $GITHUB_ENV
          
          echo "Backend URL: $BACKEND_URL"
          echo "Degree Service URL: $DEGREE_URL"
          echo "Budget Service URL: $BUDGET_URL"
          echo "Career Service URL: $CAREER_URL"
          echo "Scholarship Service URL: $SCHOLARSHIP_URL"

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            REACT_APP_BACKEND_URL=${{ env.BACKEND_URL }}
            REACT_APP_DEGREE_SERVICE_URL=${{ env.DEGREE_URL }}
            REACT_APP_BUDGET_SERVICE_URL=${{ env.BUDGET_URL }}
            REACT_APP_CAREER_SERVICE_URL=${{ env.CAREER_URL }}
            REACT_APP_SCHOLARSHIP_SERVICE_URL=${{ env.SCHOLARSHIP_URL }}
          tags: ${{ env.ACR_LOGIN_SERVER }}/unifinder-frontend:${{ github.sha }},${{ env.ACR_LOGIN_SERVER }}/unifinder-frontend:latest

      - name: Deploy Frontend Container App
        run: |
          az containerapp create \
            --name unifinder-frontend \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --environment ${{ env.CONTAINER_APPS_ENV_ID }} \
            --image ${{ env.ACR_LOGIN_SERVER }}/unifinder-frontend:latest \
            --target-port 80 \
            --ingress external \
            --registry-server ${{ env.ACR_LOGIN_SERVER }} \
            --registry-username ${{ env.ACR_USERNAME }} \
            --registry-password ${{ env.ACR_PASSWORD }} \
            --cpu 0.25 --memory 0.5Gi \
            --min-replicas 1 --max-replicas 5 \
            || az containerapp update \
              --name unifinder-frontend \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --image ${{ env.ACR_LOGIN_SERVER }}/unifinder-frontend:latest

      - name: Get Frontend URL
        run: |
          FRONTEND_URL="https://$(az containerapp show --name unifinder-frontend --resource-group ${{ env.AZURE_RESOURCE_GROUP }} --query properties.configuration.ingress.fqdn -o tsv)"
          echo "🚀 Frontend URL: $FRONTEND_URL"
          echo "FRONTEND_URL=$FRONTEND_URL" >> $GITHUB_ENV

      - name: Update Backend CORS with Frontend URL
        run: |
          az containerapp update \
            --name unifinder-backend \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --set-env-vars CORS_ORIGINS="${{ env.FRONTEND_URL }}"

      - name: Deployment Summary
        run: |
          echo "=========================================="
          echo "✅ Deployment Complete!"
          echo "=========================================="
          echo "🌐 Frontend: ${{ env.FRONTEND_URL }}"
          echo "🔧 Backend: ${{ env.BACKEND_URL }}"
          echo "🎓 Degree Service: ${{ env.DEGREE_URL }}"
          echo "💰 Budget Service: ${{ env.BUDGET_URL }}"
          echo "💼 Career Service: ${{ env.CAREER_URL }}"
          echo "🎓 Scholarship Service: ${{ env.SCHOLARSHIP_URL }}"
          echo "=========================================="
