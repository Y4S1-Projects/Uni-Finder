name: Build And Push Images To ACR

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      degree: ${{ steps.filter.outputs.degree }}
      budget: ${{ steps.filter.outputs.budget }}
      career: ${{ steps.filter.outputs.career }}
      scholarship: ${{ steps.filter.outputs.scholarship }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect changed services
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
            degree:
              - 'degree-recommendation-service/**'
            budget:
              - 'budget_optimizer_service/**'
            career:
              - 'career-service/**'
            scholarship:
              - 'scholarship_and_loan_recommendation_service/**'
            frontend:
              - 'frontend/**'

  build-and-push:
    needs: changes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check ACR Secrets
        id: check-acr
        shell: bash
        run: |
          if [ -z "${{ secrets.ACR_LOGIN_SERVER }}" ] || [ -z "${{ secrets.ACR_USERNAME }}" ] || [ -z "${{ secrets.ACR_PASSWORD }}" ]; then
            echo "configured=false" >> $GITHUB_OUTPUT
            echo "ACR secrets are missing; build/push steps will be skipped."
          else
            echo "configured=true" >> $GITHUB_OUTPUT
            echo "ACR secrets found."
          fi

      - name: Login to ACR
        if: steps.check-acr.outputs.configured == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push backend
        if: steps.check-acr.outputs.configured == 'true' && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.backend == 'true')
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          cache-from: |
            type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/unifinder-backend:buildcache
            type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/unifinder-backend:latest
          cache-to: type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/unifinder-backend:buildcache,mode=max
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/unifinder-backend:latest
            ${{ env.ACR_LOGIN_SERVER }}/unifinder-backend:${{ github.sha }}

      - name: Build and push degree service
        if: steps.check-acr.outputs.configured == 'true' && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.degree == 'true')
        uses: docker/build-push-action@v6
        with:
          context: ./degree-recommendation-service
          file: ./degree-recommendation-service/Dockerfile
          push: true
          cache-from: |
            type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/unifinder-degree-service:buildcache
            type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/unifinder-degree-service:latest
          cache-to: type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/unifinder-degree-service:buildcache,mode=max
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/unifinder-degree-service:latest
            ${{ env.ACR_LOGIN_SERVER }}/unifinder-degree-service:${{ github.sha }}

      - name: Build and push budget service
        if: steps.check-acr.outputs.configured == 'true' && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.budget == 'true')
        uses: docker/build-push-action@v6
        with:
          context: ./budget_optimizer_service
          file: ./budget_optimizer_service/Dockerfile
          push: true
          cache-from: |
            type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/unifinder-budget-service:buildcache
            type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/unifinder-budget-service:latest
          cache-to: type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/unifinder-budget-service:buildcache,mode=max
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/unifinder-budget-service:latest
            ${{ env.ACR_LOGIN_SERVER }}/unifinder-budget-service:${{ github.sha }}

      - name: Build and push career service
        if: steps.check-acr.outputs.configured == 'true' && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.career == 'true')
        uses: docker/build-push-action@v6
        with:
          context: ./career-service
          file: ./career-service/Dockerfile
          push: true
          cache-from: |
            type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/unifinder-career-service:buildcache
            type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/unifinder-career-service:latest
          cache-to: type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/unifinder-career-service:buildcache,mode=max
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/unifinder-career-service:latest
            ${{ env.ACR_LOGIN_SERVER }}/unifinder-career-service:${{ github.sha }}

      - name: Build and push scholarship service
        if: steps.check-acr.outputs.configured == 'true' && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.scholarship == 'true')
        uses: docker/build-push-action@v6
        with:
          context: ./scholarship_and_loan_recommendation_service
          file: ./scholarship_and_loan_recommendation_service/Dockerfile
          push: true
          cache-from: |
            type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/unifinder-scholarship-service:buildcache
            type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/unifinder-scholarship-service:latest
          cache-to: type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/unifinder-scholarship-service:buildcache,mode=max
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/unifinder-scholarship-service:latest
            ${{ env.ACR_LOGIN_SERVER }}/unifinder-scholarship-service:${{ github.sha }}

      - name: Build and push frontend
        if: steps.check-acr.outputs.configured == 'true' && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.frontend == 'true')
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          cache-from: |
            type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/unifinder-frontend:buildcache
            type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/unifinder-frontend:latest
          cache-to: type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/unifinder-frontend:buildcache,mode=max
          build-args: |
            REACT_APP_BACKEND_URL=https://unifinder-backend.${{ secrets.CONTAINERAPPS_DEFAULT_DOMAIN }}
            REACT_APP_DEGREE_SERVICE_URL=https://unifinder-degree-service.${{ secrets.CONTAINERAPPS_DEFAULT_DOMAIN }}
            REACT_APP_BUDGET_SERVICE_URL=https://unifinder-budget-service.${{ secrets.CONTAINERAPPS_DEFAULT_DOMAIN }}
            REACT_APP_CAREER_SERVICE_URL=https://unifinder-career-service.${{ secrets.CONTAINERAPPS_DEFAULT_DOMAIN }}
            REACT_APP_SCHOLARSHIP_SERVICE_URL=https://unifinder-scholarship-service.${{ secrets.CONTAINERAPPS_DEFAULT_DOMAIN }}
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/unifinder-frontend:latest
            ${{ env.ACR_LOGIN_SERVER }}/unifinder-frontend:${{ github.sha }}

      - name: No service changes detected
        if: steps.check-acr.outputs.configured == 'true' && github.event_name != 'workflow_dispatch' && needs.changes.outputs.backend != 'true' && needs.changes.outputs.degree != 'true' && needs.changes.outputs.budget != 'true' && needs.changes.outputs.career != 'true' && needs.changes.outputs.scholarship != 'true' && needs.changes.outputs.frontend != 'true'
        shell: bash
        run: |
          echo "No service directories changed. Skipping all image builds."

      - name: Manual Deployment Notice
        if: steps.check-acr.outputs.configured != 'true'
        shell: bash
        run: |
          echo "ACR secrets missing; no images were pushed."
          echo "Please set ACR_LOGIN_SERVER, ACR_USERNAME, ACR_PASSWORD, CONTAINERAPPS_DEFAULT_DOMAIN in GitHub Secrets."
