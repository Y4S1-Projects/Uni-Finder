[supervisord]
nodaemon=true
logfile=/dev/null
logfile_maxbytes=0
pidfile=/tmp/supervisord.pid

[program:nginx]
command=/usr/sbin/nginx -g "daemon off;"
autorestart=true
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stderr
priority=10

[program:backend]
directory=/app/backend
command=node index.js
environment=PORT="5000"
autorestart=true
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stderr
priority=20

[program:degree]
directory=/app/degree-recommendation-service
command=python -m uvicorn main:app --host 0.0.0.0 --port 5001
environment=PORT="5001"
autorestart=true
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stderr
priority=30

[program:budget]
directory=/app/budget_optimizer_service
command=python app.py
environment=PORT="5002"
autorestart=true
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stderr
priority=40

[program:career]
directory=/app/career-service
command=python -m uvicorn app:app --host 0.0.0.0 --port 5004
environment=PORT="5004"
autorestart=true
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stderr
priority=50

[program:scholarship]
directory=/app/scholarship_and_loan_recommendation_service
command=python -m uvicorn scholarship_loan_matcher_ml.api_service:app --host 0.0.0.0 --port 5005
environment=PORT="5005"
autorestart=true
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stderr
priority=60
