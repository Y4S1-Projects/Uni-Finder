version: '3.9'

services:
  # Backend Service (Node/Express)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: unifinder-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGINS=http://localhost:3000
    networks:
      - unifinder-network
    restart: unless-stopped

  # Degree Recommendation Service (FastAPI)
  degree-service:
    build:
      context: ./degree-recommendation-service
      dockerfile: Dockerfile
    container_name: unifinder-degree-service
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - CORS_ORIGINS=http://localhost:3000
    networks:
      - unifinder-network
    restart: unless-stopped

  # Budget Optimizer Service (Flask)
  budget-service:
    build:
      context: ./budget_optimizer_service
      dockerfile: Dockerfile
    container_name: unifinder-budget-service
    ports:
      - "5002:5002"
    environment:
      - PORT=5002
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - CORS_ORIGINS=http://localhost:3000
    networks:
      - unifinder-network
    restart: unless-stopped

  # Career Service (FastAPI)
  career-service:
    build:
      context: ./career-service
      dockerfile: Dockerfile
    container_name: unifinder-career-service
    ports:
      - "5004:5004"
    environment:
      - PORT=5004
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - CORS_ORIGINS=http://localhost:3000
    networks:
      - unifinder-network
    restart: unless-stopped

  # Scholarship Service (FastAPI)
  scholarship-service:
    build:
      context: ./scholarship_and_loan_recommendation_service
      dockerfile: Dockerfile
    container_name: unifinder-scholarship-service
    ports:
      - "5005:5005"
    environment:
      - PORT=5005
      - CORS_ORIGINS=http://localhost:3000
    networks:
      - unifinder-network
    restart: unless-stopped

  # Frontend (React with Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_BACKEND_URL=http://localhost:5000
        - REACT_APP_DEGREE_SERVICE_URL=http://localhost:5001
        - REACT_APP_BUDGET_SERVICE_URL=http://localhost:5002
        - REACT_APP_CAREER_SERVICE_URL=http://localhost:5004
        - REACT_APP_SCHOLARSHIP_SERVICE_URL=http://localhost:5005
    container_name: unifinder-frontend
    ports:
      - "3000:80"
    networks:
      - unifinder-network
    depends_on:
      - backend
      - degree-service
      - budget-service
      - career-service
      - scholarship-service
    restart: unless-stopped

networks:
  unifinder-network:
    driver: bridge
